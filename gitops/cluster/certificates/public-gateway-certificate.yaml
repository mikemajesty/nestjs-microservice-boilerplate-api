apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: public-gateway-tls
  namespace: envoy-gateway-system
spec:
  secretName: public-gateway-tls
  issuerRef:
    name: self-signed-cluster-issuer
    kind: ClusterIssuer
  commonName: api.boilerplate.internal
  dnsNames:
    - api.boilerplate.internal
