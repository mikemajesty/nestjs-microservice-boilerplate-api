apiVersion: apps/v1
kind: Deployment
metadata:
  name: nestjs-boilerplate-dev-smoke-app
  labels:
    app.kubernetes.io/name: nestjs-boilerplate-dev-smoke-app
    app.kubernetes.io/part-of: nestjs-boilerplate
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nestjs-boilerplate-dev-smoke-app
      app.kubernetes.io/part-of: nestjs-boilerplate
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/environment: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nestjs-boilerplate-dev-smoke-app
        app.kubernetes.io/part-of: nestjs-boilerplate
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/environment: dev
    spec:
      serviceAccountName: nestjs-boilerplate-dev-smoke-app
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nestjs-boilerplate-dev-smoke-app
          image: public.ecr.aws/o5e1h1p5/nestjs-boilerplate-dev-app@sha256:7806f030d00c50b19b1c0e75b5652ed357e7c3ba0cbff9965f77942da1eed223
          envFrom:
            - configMapRef:
                name: nestjs-boilerplate-dev-smoke-app
          ports:
            - name: http
              containerPort: 5000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
