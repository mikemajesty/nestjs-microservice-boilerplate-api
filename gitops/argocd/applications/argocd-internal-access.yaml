apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-internal-access
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mikemajesty/nestjs-microservice-boilerplate-api.git
    targetRevision: master
    path: gitops/argocd/internal-access
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
